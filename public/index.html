<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The People's Daily – Your Personal News Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', Times, serif; background: #faf7f2; color: #222; line-height: 1.5; }
    .paper { max-width: 1100px; margin: 0 auto; padding: 1.2rem 1.5rem; }
    .masthead { text-align: center; border-top: 2px solid #222; border-bottom: 3px double #222; padding: 0.8rem 0 0.6rem; margin-bottom: 1.8rem; }
    .masthead h1 { font-size: clamp(2.8rem, 6vw, 4.2rem); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; line-height: 1.1; margin: 0; }
    .date-line { font-style: italic; color: #444; margin-top: 0.3rem; font-size: 1rem; }
    .credibility-summary { display: flex; align-items: center; justify-content: center; gap: 0.8rem; margin-top: 0.5rem; font-size: 0.9rem; flex-wrap: wrap; }
    .credibility-summary .label { font-weight: bold; color: #444; }
    .credibility-bar { width: 120px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
    .credibility-fill { height: 100%; transition: width 0.5s; background: linear-gradient(90deg, #d32f2f, #fbc02d 50%, #388e3c); }
    .credibility-value { font-weight: bold; min-width: 3rem; text-align: right; }
    .main-grid { display: grid; grid-template-columns: 1fr 310px; gap: 2rem; }
    @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }
    .category-section { margin-bottom: 2.4rem; }
    .category-title { font-size: 1.8rem; font-weight: bold; border-bottom: 2px solid #222; padding-bottom: 0.25rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .article-card { background: white; border: 1px solid #ddd; border-radius: 3px; overflow: hidden; transition: box-shadow 0.2s, transform 0.1s; display: flex; flex-direction: column; }
    .article-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .article-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid #e0e0e0; }
    .article-text { padding: 1rem 1rem 0.8rem; flex: 1; display: flex; flex-direction: column; }
    .article-text h2 { font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.4rem; color: #111; }
    .excerpt { font-size: 0.9rem; color: #444; flex: 1; margin-bottom: 0.7rem; overflow-wrap: break-word; }
    .excerpt a { color: #1a0dab; text-decoration: underline; word-break: break-all; }
    .article-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #777; border-top: 1px solid #eee; padding-top: 0.5rem; flex-wrap: wrap; gap: 0.3rem; }
    .btn { background: none; border: 1px solid #555; color: #333; padding: 0.25rem 0.7rem; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s; background: #fff; }
    .btn:hover { background: #333; color: #fff; border-color: #333; }
    .note-toggle { background: none; border: none; font-size: 0.8rem; cursor: pointer; color: #555; padding: 0 0.2rem; margin-left: auto; }
    .note-toggle.has-note { color: #1a73e8; font-weight: bold; }
    .annotation-box { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .annotation-box textarea { width: 100%; border: 1px solid #ccc; border-radius: 3px; padding: 0.4rem; font-family: inherit; font-size: 0.85rem; resize: vertical; }
    .annotation-box .save-note-btn { align-self: flex-end; padding: 0.2rem 0.8rem; background: #333; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
    .weather-panel { background: #faf7f2; border: 1px solid #d5cfc4; padding: 1.2rem; border-radius: 3px; height: fit-content; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
    .weather-panel h3 { font-size: 1.3rem; border-bottom: 1px solid #aaa; padding-bottom: 0.3rem; margin-bottom: 0.8rem; }
    .weather-search { display: flex; gap: 0.3rem; margin-bottom: 0.8rem; }
    .weather-search input { flex: 1; padding: 0.45rem; border: 1px solid #aaa; border-radius: 3px; font-family: inherit; font-size: 0.85rem; }
    .weather-search button { padding: 0.45rem 0.9rem; background: #333; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
    .weather-details p { margin-bottom: 0.3rem; font-size: 0.9rem; }
    .forecast-confidence { margin-top: 1rem; padding-top: 0.6rem; border-top: 1px dashed #ccc; font-size: 0.85rem; }
    .forecast-confidence .mini-bar { width: 70px; height: 7px; background: #e0e0e0; border-radius: 4px; display: inline-block; margin-left: 0.3rem; overflow: hidden; }
    .forecast-confidence .mini-fill { height: 100%; display: block; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); justify-content: center; align-items: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; width: 92%; max-width: 1000px; max-height: 90vh; border-radius: 3px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; border-bottom: 1px solid #ddd; }
    .modal-body { flex: 1; overflow: auto; padding: 1.2rem; }
    .close-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #555; }
    .loading, .error { text-align: center; padding: 2rem; font-style: italic; }
    .error { color: #a00; }
    .article-credibility { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; }
    .mini-bar { width: 50px; height: 5px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .mini-fill { height: 100%; }
    /* Feed manager modal */
    .feed-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; padding: 0.3rem 0; border-bottom: 1px solid #eee; }
    .feed-item input, .feed-item select { flex: 1; padding: 0.3rem; border: 1px solid #aaa; border-radius: 3px; font-family: inherit; }
    .feed-item button { background: #c44; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 3px; cursor: pointer; }
    .settings-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; padding: 0.5rem; background: #e8e0d5; border-radius: 4px; font-size: 0.9rem; }
    .settings-bar input, .settings-bar select, .settings-bar button { padding: 0.4rem 0.6rem; border: 1px solid #aaa; border-radius: 4px; font-family: inherit; }
    .settings-bar button { background: #4a6741; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="paper">
    <div class="masthead">
      <h1>The People's Daily</h1>
      <div class="date-line" id="dateLine"></div>
      <div class="credibility-summary" id="editionCredibility"></div>
    </div>

    <!-- Settings bar -->
    <div class="settings-bar">
      <button id="manageFeedsBtn">🛠️ Manage Feeds</button>
      <span style="flex:1;"></span>
      <span>Add quick feed:</span>
      <input type="text" id="feedUrlInput" placeholder="RSS URL" />
      <select id="categorySelect">
        <option value="General">General</option>
        <option value="Technology">Technology</option>
        <option value="World">World</option>
        <option value="Science">Science</option>
        <option value="Culture">Culture</option>
        <option value="Local">Local</option>
      </select>
      <button id="addFeedBtn">Add</button>
    </div>

    <div class="main-grid">
      <div id="newsContent" class="news-content">
        <div class="loading">Fetching today's edition…</div>
      </div>
      <aside class="weather-panel">
        <h3>Weather Today</h3>
        <div class="weather-search">
          <input type="text" id="locationInput" placeholder="City or zip code" />
          <button id="searchWeatherBtn">Go</button>
        </div>
        <div class="weather-details" id="weatherBody"><p>Search for a location.</p></div>
        <div class="forecast-confidence" id="weatherConfidence"></div>
        <small style="display:block; margin-top:0.8rem; color:#555;">Data: Open‑Meteo (free)</small>
      </aside>
    </div>
  </div>

  <!-- PDF Viewer Modal -->
  <div class="modal" id="pdfModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Document</h3>
        <button class="close-btn" id="closePdfBtn">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Feed Management Modal -->
  <div class="modal" id="feedModal">
    <div class="modal-content" style="max-width:600px;">
      <div class="modal-header">
        <h3>Manage Your Feeds</h3>
        <button class="close-btn" id="closeFeedModalBtn">&times;</button>
      </div>
      <div class="modal-body" id="feedModalBody"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // ================= CONFIGURATION – CHANGE THESE =================
    const FRESHRSS_API = 'https://your-freshrss-domain.com/FreshRSS/api/greader.php';
    const FRESHRSS_AUTH = 'user@example.com:your-api-password';
    const CLIENT_NAME = 'PeoplesDaily';
    // ================= END CONFIGURATION =================

    // Default feeds to auto‑subscribe on first launch
    const DEFAULT_FEEDS = [
      { url: 'https://www.apnews.com/rss',                category: 'World',       label: 'AP News' },
      { url: 'https://www.democracynow.org/democracynow.rss', category: 'World',   label: 'Democracy Now' },
      { url: 'https://www.reddit.com/r/worldnews/.rss',   category: 'World',       label: 'r/WorldNews' },
      { url: 'https://hnrss.org/frontpage',               category: 'Technology',  label: 'Hacker News' },
      { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Science.xml', category: 'Science', label: 'NYT Science' },
      { url: 'https://pitchfork.com/feed/rss/',           category: 'Culture',     label: 'Pitchfork' },
      { url: 'https://www.espn.com/espn/rss/news',        category: 'Culture',     label: 'ESPN' },
      { url: 'https://www.avclub.com/rss',                category: 'Culture',     label: 'AV Club' },
      { url: 'https://www.reddit.com/r/Hasan_Piker/.rss', category: 'Culture',     label: 'r/Hasan_Piker' },
      { url: 'https://www.youtube.com/feeds/videos.xml?channel_id=UCto7DqB4pJWVr7bFm75cI7g', category: 'Culture', label: 'HasanAbi YouTube' }
    ];

    // Local feeds list (synced with localStorage and FreshRSS)
    let feeds = JSON.parse(localStorage.getItem('customFeeds')) || [];

    // ================= EXTERNAL DATASETS =================
    let allsidesRatings = {};
    fetch('data/allsides_bias_ratings.json')
      .then(res => res.json())
      .then(data => { allsidesRatings = data; })
      .catch(err => console.warn('AllSides dataset not loaded – using limited fallback:', err));

    // ================= CREDIBILITY ENGINE =================
    const MBFC_SOURCE_MAP = { "apnews.com":85,"reuters.com":90,"bbc.co.uk":80,"bbc.com":80,"nytimes.com":70,"washingtonpost.com":65,"hnrss.org":60,"theguardian.com":75,"cnn.com":55,"foxnews.com":45 };
    function getMBFCScore(domain) { domain = domain.toLowerCase().replace(/^www\./, ''); return MBFC_SOURCE_MAP[domain] ?? 50; }
    function getAllSidesScore(domain) { domain = domain.toLowerCase().replace(/^www\./, ''); const e = allsidesRatings[domain]; if(!e) return 50; const m = { 'left':25,'left-center':60,'center':100,'right-center':60,'right':25 }; return m[e.rating]??50; }
    const ADFONTES_RELIABILITY = { 'apnews.com':90,'reuters.com':92,'bbc.co.uk':85,'bbc.com':85,'npr.org':82,'nytimes.com':70,'washingtonpost.com':72,'foxnews.com':55,'cnn.com':62,'msnbc.com':58,'theguardian.com':78,'wsj.com':80,'huffpost.com':65,'breitbart.com':30,'infowars.com':15 };
    function getAdFontesScore(domain) { domain = domain.toLowerCase().replace(/^www\./, ''); return ADFONTES_RELIABILITY[domain]??50; }
    const SENSATIONAL_WORDS = ['shocking','outrage','amazing','unbelievable','devastating','miracle','terrible','horrific','disaster','tragedy','must see','viral','incredible','mind-blowing','explosive','bombshell','exposed','insane','crazy','scandal','cover-up','annihilate','crush'];
    function analyzeBias(text) { if(!text) return 50; let c=0; const t=text.toLowerCase(); SENSATIONAL_WORDS.forEach(w=>c+=(t.match(new RegExp('\\b'+w+'\\b','g'))||[]).length); c+=(t.match(/!{2,}/g)||[]).length+(t.match(/\b[A-Z]{4,}\b/g)||[]).length; return Math.max(0,Math.min(100,100-c*6)); }
    function getFreshnessScore(pub) { const h=(Date.now()/1000-pub)/3600; if(h<=24) return 100; return Math.max(50,100-((h-24)/(168-24))*50); }
    const MATERIALIST_LEXICON = ['class struggle','class conflict','working class','proletariat','bourgeoisie','exploitation','surplus value','means of production','base and superstructure','historical materialism','dialectical','contradiction','material conditions','forces of production','relations of production','labor power','alienation','commodity fetishism','imperialism','hegemony','ideology','false consciousness','class consciousness','revolution','praxis','social formation','mode of production','primitive accumulation','crisis of capitalism','uneven development','historical context','systemic oppression','structural inequality','racial capitalism','feminization of poverty','environmental justice','metabolic rift','dialectics of nature'];
    function analyzeMaterialistContext(text) { if(!text||text.length<20) return 50; const w=text.toLowerCase().split(/\s+/); let m=0; const l=text.toLowerCase(); MATERIALIST_LEXICON.forEach(p=>m+=(l.match(new RegExp(p,'g'))||[]).length); const d=(m/w.length)*100; return Math.min(100,Math.round(100*(1-Math.exp(-d*2.5)))); }
    function getIdeologicalCorrection(domain) { domain=domain.toLowerCase().replace(/^www\./,''); const e=allsidesRatings[domain]; if(!e) return 100; const r=e.rating; let rs=100; if(r==='right') rs=0; else if(r==='right-center') rs=50; let ls=100; if(r==='left') ls=80; return Math.round((rs*4+ls*1)/5); }
    const W_TRUSTED=['apnews.com','reuters.com','bbc.co.uk','bbc.com','npr.org','pbs.org','propublica.org','economist.com','nature.com','science.org','theguardian.com','wsj.com','washingtonpost.com'];
    const W_UNRELIABLE=['infowars.com','breitbart.com','dailycaller.com','occupy-democrats.com','theduran.com','pravda.ru'];
    function getWikipediaModifier(domain) { domain=domain.toLowerCase().replace(/^www\./,''); if(W_TRUSTED.includes(domain)) return 10; if(W_UNRELIABLE.includes(domain)) return -10; return 0; }
    function computeArticleCredibility(domain,text,pub) { const mbfc=getMBFCScore(domain),allsides=getAllSidesScore(domain),adfontes=getAdFontesScore(domain); const bias=analyzeBias(text),fresh=getFreshnessScore(pub),depth=analyzeMaterialistContext(text); const ideo=getIdeologicalCorrection(domain),wiki=getWikipediaModifier(domain); let s=(mbfc*0.2375)+(allsides*0.2375)+(adfontes*0.2375)+(bias*0.095)+(fresh*0.0475)+(depth*0.095)+(ideo*0.05); s=Math.max(0,Math.min(100,s+wiki)); return Math.round(s); }

    function sanitizeHTML(html) { const div=document.createElement('div'); div.innerHTML=html; const ok=['A','B','I','EM','STRONG','BR','P','UL','LI','OL']; const cleanse=n=>{ if(n.nodeType===3) return; if(n.nodeType===1){ if(!ok.includes(n.tagName)){while(n.firstChild)n.parentNode.insertBefore(n.firstChild,n);n.parentNode.removeChild(n);} else{ const a=n.attributes; for(let i=a.length-1;i>=0;i--){ if(a[i].name!=='href') n.removeAttribute(a[i].name); } Array.from(n.childNodes).forEach(cleanse); } } }; Array.from(div.childNodes).forEach(cleanse); return div.innerHTML; }
    function getAnnotationKey(url){ return 'note_'+(url||'unknown'); }
    function getSavedNote(url){ try{return localStorage.getItem(getAnnotationKey(url))||'';}catch(e){return'';} }
    function saveNote(url,text){ try{localStorage.setItem(getAnnotationKey(url),text);}catch(e){} }

    // ================= WEATHER =================
    let weatherLat=null,weatherLon=null;
    document.addEventListener('DOMContentLoaded',()=>{
      document.getElementById('dateLine').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      ensureDefaultFeeds().then(()=>loadFreshRSSFeeds());
      document.getElementById('searchWeatherBtn').addEventListener('click',searchWeather);
      document.getElementById('locationInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchWeather();});
      document.getElementById('manageFeedsBtn').addEventListener('click',openFeedManager);
      document.getElementById('addFeedBtn').addEventListener('click',addQuickFeed);
      document.getElementById('closeFeedModalBtn').addEventListener('click',()=>document.getElementById('feedModal').classList.remove('active'));
      if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(p=>{weatherLat=p.coords.latitude.toFixed(4);weatherLon=p.coords.longitude.toFixed(4);fetchWeatherData();},()=>{}); }
      document.getElementById('closePdfBtn').addEventListener('click',()=>document.getElementById('pdfModal').classList.remove('active'));
      window.addEventListener('click',e=>{if(e.target.classList.contains('modal'))e.target.classList.remove('active');});
    });

    async function searchWeather(){ const q=document.getElementById('locationInput').value.trim(); if(!q) return; document.getElementById('weatherBody').innerHTML='<p>Searching…</p>'; try{ const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&format=json`); const d=await g.json(); if(!d.results?.length){ document.getElementById('weatherBody').innerHTML='<p>Not found.</p>';return; } const l=d.results[0]; weatherLat=l.latitude.toFixed(4); weatherLon=l.longitude.toFixed(4); document.getElementById('locationInput').value=`${l.name}, ${l.admin1||''}, ${l.country}`; fetchWeatherData(); }catch(e){ document.getElementById('weatherBody').innerHTML='<p>Error.</p>'; } }
    async function fetchWeatherData(){ if(!weatherLat||!weatherLon) return; const body=document.getElementById('weatherBody'); body.innerHTML='<p>Loading…</p>'; try{ const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${weatherLat}&longitude=${weatherLon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`); const data=await res.json(); const c=data.current_weather,d=data.daily,desc=getWeatherDesc(c.weathercode); body.innerHTML=`<p><strong>${desc}</strong></p><p>🌡️ ${c.temperature}°C &nbsp; 💨 ${c.windspeed} km/h</p><hr style="margin:0.6rem 0;border-top:1px solid #ccc;"><p><strong>Today:</strong> ↑${d.temperature_2m_max[0]}°C ↓${d.temperature_2m_min[0]}°C</p><p><strong>Tomorrow:</strong> ↑${d.temperature_2m_max[1]}°C ↓${d.temperature_2m_min[1]}°C</p>`; const tA=getWeatherAccuracy(0),mA=getWeatherAccuracy(1); document.getElementById('weatherConfidence').innerHTML=`<div>Forecast Confidence:</div><div style="display:flex;align-items:center;gap:0.3rem;"><span>Today ${tA}%</span><div class="mini-bar"><div class="mini-fill" style="width:${tA}%;background:#388e3c;"></div></div></div><div style="display:flex;align-items:center;gap:0.3rem;margin-top:0.2rem;"><span>Tomorrow ${mA}%</span><div class="mini-bar"><div class="mini-fill" style="width:${mA}%;background:#fbc02d;"></div></div></div>`; document.getElementById('weatherConfidence').dataset.accuracy=Math.round((tA+mA)/2); updateEditionCredibility(); }catch(e){ body.innerHTML='<p>Failed.</p>'; } }
    function getWeatherDesc(code){ const m={0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',71:'Slight snow',73:'Moderate snow',75:'Heavy snow',95:'Thunderstorm'}; return m[code]||'Unknown'; }
    function getWeatherAccuracy(i){ const a=[95,90,82,76,72,65,63]; return a[Math.min(i,a.length-1)]; }

    // ================= FRESHRSS AUTO‑SUBSCRIBE =================
    async function ensureDefaultFeeds(){ try{ const sub=await makeFreshRSSRequest('subscription/list',{output:'json'}); const existing=(sub.subscriptions||[]).map(s=>s.id.replace('feed/','')); for(const f of DEFAULT_FEEDS){ if(!existing.includes(f.url)){ await makeFreshRSSRequest('subscription/edit',{ac:'subscribe',s:`feed/${f.url}`,t:f.category,client:CLIENT_NAME}); console.log('Subscribed to',f.label); } } }catch(e){ console.warn('Auto‑subscribe failed:',e); } }

    async function makeFreshRSSRequest(endpoint,params={}){ const u=new URL(FRESHRSS_API+'/'+endpoint); Object.entries(params).forEach(([k,v])=>u.searchParams.append(k,v)); const h=new Headers(); h.append('Authorization','Basic '+btoa(FRESHRSS_AUTH)); const r=await fetch(u.toString(),{headers:h}); if(!r.ok) throw new Error(`FreshRSS error ${r.status}`); return await r.json(); }

    // ================= FEED MANAGEMENT (UI) =================
    function openFeedManager(){ loadFeedsFromStorage(); const body=document.getElementById('feedModalBody'); body.innerHTML=''; let html=''; feeds.forEach((f,i)=>{ html+=`<div class="feed-item"><span>${f.category}</span><input type="text" value="${f.url}" data-index="${i}" class="feed-url-edit"><select class="feed-cat-edit" data-index="${i}">${['General','Technology','World','Science','Culture','Local'].map(c=>`<option value="${c}" ${f.category===c?'selected':''}>${c}</option>`).join('')}</select><button class="delete-feed-btn" data-index="${i}">✕</button></div>`; }); html+='<button id="addEmptyFeedBtn" style="margin-top:0.5rem;">+ Add New Feed</button>'; body.innerHTML=html; document.querySelectorAll('.feed-url-edit').forEach(inp=>inp.addEventListener('change',e=>{ feeds[e.target.dataset.index].url=e.target.value; saveFeeds(); })); document.querySelectorAll('.feed-cat-edit').forEach(sel=>sel.addEventListener('change',e=>{ feeds[e.target.dataset.index].category=e.target.value; saveFeeds(); })); document.querySelectorAll('.delete-feed-btn').forEach(btn=>btn.addEventListener('click',e=>{ feeds.splice(e.target.dataset.index,1); saveFeeds(); openFeedManager(); })); document.getElementById('addEmptyFeedBtn')?.addEventListener('click',()=>{ feeds.push({url:'',category:'General'}); saveFeeds(); openFeedManager(); }); document.getElementById('feedModal').classList.add('active'); }

    function addQuickFeed(){ const url=document.getElementById('feedUrlInput').value.trim(),cat=document.getElementById('categorySelect').value; if(!url) return; if(feeds.some(f=>f.url===url)){alert('Feed already exists');return;} feeds.push({url,category:cat}); saveFeeds(); document.getElementById('feedUrlInput').value=''; loadFreshRSSFeeds(); }

    function loadFeedsFromStorage(){ feeds = JSON.parse(localStorage.getItem('customFeeds')) || []; }
    function saveFeeds(){ localStorage.setItem('customFeeds',JSON.stringify(feeds)); loadFreshRSSFeeds(); }

    // ================= LOAD & RENDER =================
    async function loadFreshRSSFeeds(){ const nc=document.getElementById('newsContent'); nc.innerHTML='<div class="loading">Loading categories…</div>'; try{ const tags=await makeFreshRSSRequest('tag/list'); const cats={}; tags.tags.forEach(t=>{ if(t.id.startsWith('user/-/label/')&&t.type==='tag'){ const n=t.id.replace('user/-/label/',''); cats[n]={id:t.id,name:n}; } }); const order=['World','Technology','Science','Culture','Local','General']; const sorted=[]; order.forEach(o=>{if(cats[o])sorted.push(cats[o]);}); Object.keys(cats).forEach(k=>{if(!order.includes(k))sorted.push(cats[k]);}); nc.innerHTML=''; let allCreds=[]; for(const cat of sorted){ const sec=document.createElement('div'); sec.className='category-section'; sec.innerHTML=`<h2 class="category-title">${cat.name}</h2><div class="articles-grid" id="cat-${cat.name}"></div>`; nc.appendChild(sec); const s=await makeFreshRSSRequest('stream/contents/'+encodeURIComponent(cat.id),{n:15,r:'o',c:'json'}); const grid=document.getElementById(`cat-${cat.name}`); if(s.items?.length){ const creds=renderArticles(grid,s.items); allCreds=allCreds.concat(creds); }else{ grid.innerHTML='<p style="color:#666;font-style:italic;">No articles.</p>'; } } updateEditionCredibility(allCreds); }catch(e){ nc.innerHTML=`<div class="error">Failed to load news. ${e.message}</div>`; } }

    function extractDomain(url){ try{ const a=new URL(url); return a.hostname.replace(/^www\./,''); }catch(_){return'';} }

    function renderArticles(container,items){ const creds=[]; items.forEach(item=>{ const card=document.createElement('div');card.className='article-card'; let img=null; if(item.enclosure?.[0]?.href)img=item.enclosure[0].href; else if(item.visual?.url)img=item.visual.url; else{ const m=(item.summary?.content||'').match(/<img[^>]+src="([^"]+)"/); if(m)img=m[1]; } if(img){ const i=document.createElement('img');i.src=img;i.onerror=()=>i.style.display='none';card.appendChild(i); } const td=document.createElement('div');td.className='article-text'; const h2=document.createElement('h2');h2.textContent=item.title||'Untitled';td.appendChild(h2); const ex=document.createElement('div');ex.className='excerpt'; ex.innerHTML=sanitizeHTML((item.summary?.content||'').substring(0,600));td.appendChild(ex); const meta=document.createElement('div');meta.className='article-meta'; const ds=document.createElement('span');ds.textContent=new Date((item.published||0)*1000).toLocaleDateString();meta.appendChild(ds); const domain=extractDomain(item.canonical?.[0]?.href||item.alternate?.[0]?.href||''); const ft=((item.title||'')+' '+(item.summary?.content||'')).substring(0,500); const cred=computeArticleCredibility(domain,ft,item.published||0);creds.push(cred); const cd=document.createElement('div');cd.className='article-credibility'; cd.innerHTML=`Acc: ${cred}% <div class="mini-bar"><div class="mini-fill" style="width:${cred}%;background:${cred>70?'#388e3c':cred>40?'#fbc02d':'#d32f2f'};"></div></div>`;meta.appendChild(cd); const link=item.canonical?.[0]?.href||item.alternate?.[0]?.href||'#'; if(link.toLowerCase().endsWith('.pdf')){ const b=document.createElement('button');b.className='btn';b.textContent='📄 PDF';b.onclick=e=>{e.stopPropagation();openPDF(link,item.title);};meta.appendChild(b); }else{ const rb=document.createElement('button');rb.className='btn';rb.textContent='READ';rb.onclick=()=>window.open(link,'_blank');meta.appendChild(rb); } const sb=document.createElement('button');sb.className='btn';sb.textContent='🔊'; sb.onclick=()=>{speechSynthesis.cancel();speechSynthesis.speak(new SpeechSynthesisUtterance(item.title+'. '+ex.textContent));};meta.appendChild(sb); const nb=document.createElement('button');nb.className='note-toggle'; const sn=getSavedNote(link);nb.innerHTML=sn?'✎<span style="font-size:0.7rem;">✓</span>':'✎ Note'; nb.classList.toggle('has-note',!!sn); const ac=document.createElement('div');ac.className='annotation-box';ac.style.display='none'; const ta=document.createElement('textarea');ta.rows=2;ta.value=sn; const sbtn=document.createElement('button');sbtn.className='save-note-btn';sbtn.textContent='Save Note'; sbtn.onclick=()=>{saveNote(link,ta.value);nb.innerHTML=ta.value.trim()?'✎<span style="font-size:0.7rem;">✓</span>':'✎ Note';nb.classList.toggle('has-note',!!ta.value.trim());}; ac.appendChild(ta);ac.appendChild(sbtn); nb.addEventListener('click',e=>{e.stopPropagation();ac.style.display=ac.style.display==='none'?'flex':'none';}); meta.appendChild(nb);td.appendChild(meta);td.appendChild(ac); card.appendChild(td);container.appendChild(card); }); return creds; }

    function updateEditionCredibility(articleCreds){ const wa=document.getElementById('weatherConfidence')?.dataset?.accuracy; const avg=articleCreds?.length?articleCreds.reduce((a,b)=>a+b,0)/articleCreds.length:50; let overall=avg; if(wa)overall=(avg*0.7+parseInt(wa)*0.3); const el=document.getElementById('editionCredibility'); if(el){ el.innerHTML=`<span class="label">Today's Edition Reliability:</span><div class="credibility-bar"><div class="credibility-fill" style="width:${overall.toFixed(0)}%;"></div></div><span class="credibility-value">${overall.toFixed(0)}%</span>`; } }

    async function openPDF(url,title){ const modal=document.getElementById('pdfModal');document.getElementById('modalTitle').textContent=title;const body=document.getElementById('modalBody');body.innerHTML='Loading PDF…';modal.classList.add('active'); try{ const pdf=await pdfjsLib.getDocument(url).promise;let p=1; body.innerHTML=`<div style="margin-bottom:0.8rem;"><button id="prevPage" class="btn">◀ Prev</button><span style="margin:0 1rem;">Page <span id="currentPage">1</span> / ${pdf.numPages}</span><button id="nextPage" class="btn">Next ▶</button><a href="${url}" download style="margin-left:auto;">⬇ Download</a></div><canvas id="pdfCanvas"></canvas>`; const c=document.getElementById('pdfCanvas'),ctx=c.getContext('2d'); async function r(n){ const page=await pdf.getPage(n); const vp=page.getViewport({scale:1.5}); c.width=vp.width;c.height=vp.height; await page.render({canvasContext:ctx,viewport:vp}).promise; document.getElementById('currentPage').textContent=n; } r(1); document.getElementById('prevPage').onclick=()=>{if(p>1)r(--p);}; document.getElementById('nextPage').onclick=()=>{if(p<pdf.numPages)r(++p);}; }catch(e){ body.innerHTML=`<p>PDF load failed. <a href="${url}" target="_blank">Open directly</a></p>`; } }
  </script>
</body>
